<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Keenan Govender and Company | Attorneys at Law</title>
    <meta name="description" content="Modern, dynamic law firm delivering expert solutions in corporate, labour, litigation, family, and estates." />
    <meta name="keywords" content="Law Firm, Johannesburg, Attorneys, Legal Expertise, Keenan Govender" />

    <!-- Google Fonts: Playfair Display for Serifs and Inter for Sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN (For rapid prototyping/development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
          },
        },
      }
    </script>

    <style>
      /* Ensure the background remains dark during initial load */
      body {
        background-color: #020617; /* slate-950 */
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <!-- React Root Entry Point -->
    <div id="root"></div>

    <!-- Script entry point (assuming a standard Vite or Create React App structure) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
