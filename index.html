<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keenan Govender & Co | Attorneys at Law</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & Babel for single-file execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }
        body {
            margin: 0;
            background-color: #020617; /* slate-950 */
            font-family: var(--font-sans);
            color: white;
        }
        .font-serif { font-family: var(--font-serif); }
        .bg-clip-text {
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.8s ease-out; }
        html { scroll-behavior: smooth; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb {
            background: rgba(217, 119, 6, 0.5);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LawFirmWebsite = () => {
            const [menuOpen, setMenuOpen] = useState(false);
            const [scrollPosition, setScrollPosition] = useState(0);
            const [formStatus, setFormStatus] = useState('');

            useEffect(() => {
                const handleScroll = () => setScrollPosition(window.scrollY);
                window.addEventListener('scroll', handleScroll);
                // Initialize Lucide icons
                lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Re-run icon generation when menu opens or sections render
            useEffect(() => {
                lucide.createIcons();
            }, [menuOpen, formStatus]);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setMenuOpen(false);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setFormStatus('success');
                setTimeout(() => setFormStatus(''), 3000);
            };

            const services = [
                { name: 'Commercial Law', icon: 'briefcase', description: 'Contract drafting, negotiations, and business advisory' },
                { name: 'Labour Law', icon: 'users', description: 'Employment disputes and HR compliance' },
                { name: 'Family Law', icon: 'home', description: 'Matrimonial and children matters' },
                { name: 'Road Freight Law', icon: 'truck', description: 'Transport and logistics legal services' },
                { name: 'Debt Collection', icon: 'credit-card', description: 'Efficient debt recovery solutions' },
                { name: 'Civil Litigation', icon: 'scale', description: 'Expert representation in civil disputes' },
                { name: 'Criminal Litigation', icon: 'gavel', description: 'Comprehensive criminal defense' },
                { name: 'Trusts & Estates', icon: 'shield', description: 'Estate planning and administration' },
                { name: 'Agency Work', icon: 'handshake', description: 'Professional agent representation' },
                { name: 'Competition Law', icon: 'trending-up', description: 'Compliance and competition matters' },
            ];

            return (
                <div className="min-h-screen bg-slate-950 text-white overflow-hidden">
                    {/* Background Accents */}
                    <div className="fixed inset-0 pointer-events-none overflow-hidden">
                        <div className="absolute top-20 right-10 w-96 h-96 bg-amber-500/5 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-40 left-10 w-96 h-96 bg-amber-500/5 rounded-full blur-3xl"></div>
                    </div>

                    {/* Navigation Bar */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrollPosition > 50 ? 'bg-slate-950/80 backdrop-blur-xl border-b border-amber-500/10' : 'bg-transparent'}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-gradient-to-br from-amber-400 to-amber-600 rounded-lg flex items-center justify-center">
                                    <i data-lucide="scale" className="w-5 h-5 text-slate-950"></i>
                                </div>
                                <span className="text-xl font-serif font-bold bg-gradient-to-r from-amber-300 via-amber-400 to-amber-500 bg-clip-text text-transparent">
                                    KG & Co
                                </span>
                            </div>
                            
                            <div className="hidden md:flex gap-8 items-center">
                                {['home', 'about', 'services'].map(item => (
                                    <button key={item} onClick={() => scrollToSection(item)} className="text-sm font-medium hover:text-amber-400 transition capitalize">
                                        {item}
                                    </button>
                                ))}
                                <button onClick={() => scrollToSection('contact')} className="px-6 py-2 bg-gradient-to-r from-amber-400 to-amber-600 text-slate-950 font-semibold rounded-lg hover:shadow-lg transition-all transform active:scale-95">
                                    Contact
                                </button>
                            </div>
                            
                            <button className="md:hidden" onClick={() => setMenuOpen(!menuOpen)}>
                                {menuOpen ? <i data-lucide="x"></i> : <i data-lucide="menu"></i>}
                            </button>
                        </div>

                        {menuOpen && (
                            <div className="md:hidden bg-slate-950/95 p-4 border-b border-amber-500/10 flex flex-col gap-4">
                                {['home', 'about', 'services', 'contact'].map(item => (
                                    <button key={item} onClick={() => scrollToSection(item)} className="text-left py-2 hover:text-amber-400 transition capitalize">
                                        {item}
                                    </button>
                                ))}
                            </div>
                        )}
                    </nav>

                    {/* Hero Section */}
                    <section id="home" className="relative min-h-screen flex items-center justify-center pt-20 px-4">
                        <div className="relative z-10 max-w-4xl mx-auto text-center space-y-8 animate-fade-in">
                            <h1 className="text-5xl md:text-7xl font-serif font-bold leading-tight">
                                Exceptional <br />
                                <span className="bg-gradient-to-r from-amber-300 via-amber-400 to-amber-500 bg-clip-text text-transparent">Legal Expertise</span>
                            </h1>
                            <p className="text-lg md:text-xl text-slate-300 max-w-2xl mx-auto font-light leading-relaxed">
                                Modern, innovative, and expert legal solutions for even the most complex matters.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center pt-8">
                                <button onClick={() => scrollToSection('contact')} className="px-8 py-4 bg-gradient-to-r from-amber-400 to-amber-600 text-slate-950 font-semibold rounded-lg hover:shadow-2xl transition-all transform hover:scale-105 flex items-center justify-center gap-2">
                                    Contact Our Experts <i data-lucide="arrow-right" className="w-5 h-5"></i>
                                </button>
                                <button onClick={() => scrollToSection('services')} className="px-8 py-4 border border-amber-400/50 text-amber-300 font-semibold rounded-lg hover:bg-amber-400/10 transition-all">
                                    Explore Services
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* About Section */}
                    <section id="about" className="py-20 px-4 max-w-6xl mx-auto">
                        <div className="grid md:grid-cols-2 gap-12 items-center">
                            <div className="space-y-6">
                                <span className="text-amber-400 font-semibold text-sm tracking-widest uppercase">About Us</span>
                                <h2 className="text-4xl md:text-5xl font-serif font-bold">Client-Focused. <br/><span className="text-amber-400">Purpose-Driven.</span></h2>
                                <p className="text-slate-300 text-lg leading-relaxed">
                                    Keenan Govender and Company combines legal excellence with a commitment to understanding our clients' unique challenges. We partner with you to achieve meaningful results through practical law and personalised service.
                                </p>
                                <div className="flex gap-4 items-center">
                                    <div className="w-12 h-12 bg-amber-400/10 rounded-lg flex items-center justify-center border border-amber-400/30">
                                        <i data-lucide="shield" className="text-amber-400"></i>
                                    </div>
                                    <div>
                                        <h4 className="font-bold">Expert Representation</h4>
                                        <p className="text-slate-400 text-sm">Trusted by individuals and corporations.</p>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-slate-900/50 border border-amber-400/20 rounded-2xl p-10 text-center relative overflow-hidden">
                                <div className="relative z-10">
                                    <div className="text-6xl font-serif font-bold text-amber-400 mb-2">50+</div>
                                    <p className="text-slate-400 text-lg">Years Combined Experience</p>
                                    <div className="mt-8 pt-8 border-t border-amber-400/10 italic text-slate-300">
                                        "Embracing innovation while respecting the principles of trustworthy law practice."
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Services Section */}
                    <section id="services" className="py-20 px-4 bg-slate-900/30">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16 space-y-4">
                                <span className="text-amber-400 font-semibold text-sm tracking-widest uppercase">Our Practice Areas</span>
                                <h2 className="text-4xl font-serif font-bold">Comprehensive Legal <span className="text-amber-400">Solutions</span></h2>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {services.map((s, i) => (
                                    <div key={i} className="group bg-slate-900 border border-amber-400/10 p-8 rounded-xl hover:border-amber-400/40 transition-all hover:shadow-xl hover:shadow-amber-500/5 transform hover:-translate-y-1">
                                        <div className="w-14 h-14 bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center rounded-lg mb-6 group-hover:shadow-lg group-hover:shadow-amber-500/20">
                                            <i data-lucide={s.icon} className="text-slate-950 w-7 h-7"></i>
                                        </div>
                                        <h3 className="text-xl font-serif font-bold mb-3">{s.name}</h3>
                                        <p className="text-slate-400 text-sm leading-relaxed">{s.description}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-20 px-4 max-w-6xl mx-auto">
                        <div className="grid md:grid-cols-2 gap-12">
                            <div className="space-y-8">
                                <h2 className="text-4xl md:text-5xl font-serif font-bold">Ready to Discuss <br/><span className="text-amber-400">Your Legal Needs?</span></h2>
                                <p className="text-slate-300 text-lg leading-relaxed">
                                    Contact us today for a confidential consultation. Our team is ready to provide expert guidance on your specific situation.
                                </p>
                                <div className="space-y-6">
                                    <div className="flex items-center gap-4 p-4 bg-slate-900 border border-amber-400/10 rounded-xl">
                                        <i data-lucide="phone" className="text-amber-400"></i>
                                        <div>
                                            <p className="text-xs text-slate-500">Phone</p>
                                            <p className="font-bold">061 434 9865</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 p-4 bg-slate-900 border border-amber-400/10 rounded-xl">
                                        <i data-lucide="mail" className="text-amber-400"></i>
                                        <div>
                                            <p className="text-xs text-slate-500">Email</p>
                                            <p className="font-bold">info@kgandco.co.za</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 p-4 bg-slate-900 border border-amber-400/10 rounded-xl">
                                        <i data-lucide="clock" className="text-amber-400"></i>
                                        <div>
                                            <p className="text-xs text-slate-500">Business Hours</p>
                                            <p className="font-bold">Mon – Fri (08h00 – 16h30)</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <form onSubmit={handleSubmit} className="bg-slate-900 border border-amber-400/20 p-8 rounded-2xl space-y-6">
                                <div className="space-y-2">
                                    <label className="text-sm font-semibold">Full Name</label>
                                    <input type="text" placeholder="John Doe" required className="w-full bg-slate-800 border-none rounded-lg p-4 focus:ring-2 focus:ring-amber-400 outline-none transition"/>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-semibold">Email Address</label>
                                    <input type="email" placeholder="john@example.com" required className="w-full bg-slate-800 border-none rounded-lg p-4 focus:ring-2 focus:ring-amber-400 outline-none transition"/>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-semibold">Message</label>
                                    <textarea placeholder="How can we help you?" rows="4" required className="w-full bg-slate-800 border-none rounded-lg p-4 focus:ring-2 focus:ring-amber-400 outline-none transition resize-none"></textarea>
                                </div>
                                <button className="w-full bg-gradient-to-r from-amber-400 to-amber-600 text-slate-950 font-bold py-4 rounded-lg hover:shadow-xl transition-all transform active:scale-95">
                                    Send Message
                                </button>
                                {formStatus === 'success' && (
                                    <p className="text-green-400 text-center font-medium animate-pulse">✓ Thank you! We will get back to you shortly.</p>
                                )}
                            </form>
                        </div>
                    </section>

                    <footer className="py-12 border-t border-amber-400/10 bg-slate-950 text-center text-slate-500 text-sm">
                        <div className="mb-4">
                            <span className="font-serif font-bold text-amber-400">Keenan Govender & Company</span>
                        </div>
                        <p>&copy; 2024 Keenan Govender and Company. All rights reserved.</p>
                        <div className="flex justify-center gap-6 mt-4">
                            <a href="#" className="hover:text-amber-400">Privacy Policy</a>
                            <a href="#" className="hover:text-amber-400">Terms of Service</a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LawFirmWebsite />);
    </script>
</body>
</html>
